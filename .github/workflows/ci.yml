name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      HAS_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        env:
          BUILD_OUT_DIR: dist
        run: npm run build

      - name: Memory Store QA
        run: npm run qa:memory:store

      - name: Launch DB QA
        run: npm run qa:launch-db

      - name: Live Gemini Strict Gate
        if: ${{ env.HAS_GEMINI_API_KEY != '' }}
        env:
          GEMINI_API_KEY: ${{ env.HAS_GEMINI_API_KEY }}
        run: npm run ci:gemini
